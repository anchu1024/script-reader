<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VN Editor (SE & Sync Option)</title>
    <style>
      :root {
        --bg-dark: #1e293b;
        --bg-panel: #334155;
        --text-light: #f8fafc;
        --accent: #3b82f6;
        --accent-bg: #10b981; /* 背景変更用 */
        --accent-music: #a855f7; /* BGM変更用 */
        --accent-sfx: #f59e0b; /* 効果音用 (新規) */
        --danger: #ef4444; /* 削除ボタン用 */
        --border: #475569;
      }

      .editor {
        position: absolute;
        top: 0px;
        left: 0px;
        width: 100vw;
        height: 100vh;
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg-dark);
        color: var(--text-light);
        display: flex;
        flex-direction: column;
      }

      /* --- Header --- */
      header {
        background: #0f172a;
        padding: 0.8rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      h1 {
        margin: 0;
        font-size: 1.2rem;
      }

      .btn-group {
        display: flex;
        gap: 0.5rem;
      }

      .btn-run {
        background: #22c55e;
        color: white;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-settings {
        background: #475569;
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .btn-settings:hover {
        background: #64748b;
      }

      /* --- Main Layout --- */
      main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* --- Asset Zone (Left) --- */
      #asset-zone {
        width: 340px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 1rem;
        box-sizing: border-box;
      }

      .zone-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        color: #94a3b8;
        margin-bottom: 0.5rem;
        font-weight: bold;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.2rem;
        margin-top: 1.5rem;
      }
      .zone-title:first-child {
        margin-top: 0;
      }

      .char-creator {
        background: rgba(0, 0, 0, 0.2);
        padding: 1rem;
        border-radius: 6px;
      }
      .input-group {
        margin-bottom: 0.5rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.2rem;
      }
      input[type="text"],
      input[type="file"],
      select {
        width: 100%;
        padding: 0.4rem;
        box-sizing: border-box;
        background: #1e293b;
        border: 1px solid var(--border);
        color: white;
        border-radius: 4px;
      }
      button.btn-add {
        width: 100%;
        background: var(--accent);
        color: white;
        border: none;
        padding: 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      button.btn-danger {
        background: var(--danger);
        color: white;
        border: none;
        padding: 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 1rem;
        width: 100%;
      }

      .asset-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
        gap: 8px;
        margin-bottom: 1rem;
      }

      .asset-item {
        background: #1e293b;
        border-radius: 4px;
        padding: 4px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s;
        position: relative;
        border: 2px solid transparent;
      }
      .asset-item:hover {
        background: #475569;
      }
      .asset-item img {
        width: 100%;
        height: 60px;
        object-fit: cover;
        border-radius: 2px;
      }
      .asset-item .audio-icon {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: #334155;
        border-radius: 2px;
      }
      .asset-item .name {
        font-size: 0.7rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .char-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        background: var(--accent);
        font-size: 0.6rem;
        padding: 1px 3px;
        border-radius: 3px;
        pointer-events: none;
      }

      .btn-delete-asset {
        position: absolute;
        top: -6px;
        left: -6px;
        width: 20px;
        height: 20px;
        background-color: var(--danger);
        color: white;
        border: 2px solid var(--bg-panel);
        border-radius: 50%;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .asset-item:hover .btn-delete-asset {
        display: flex;
      }
      .btn-delete-asset:hover {
        transform: scale(1.1);
      }

      /* --- Script Zone (Right) --- */
      #script-zone {
        flex: 1;
        padding: 1rem;
        overflow-y: auto;
        background: #0f172a;
        position: relative;
      }
      #script-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-bottom: 80px;
      }

      /* Row Styles */
      .script-row {
        display: flex;
        background: var(--bg-panel);
        border-radius: 6px;
        border: 1px solid var(--border);
        min-height: 100px;
        align-items: stretch;
        position: relative;
      }

      /* Type Variations */
      .script-row.type-bg {
        border-color: var(--accent-bg);
        background: rgba(16, 185, 129, 0.1);
      }
      .script-row.type-bgm {
        border-color: var(--accent-music);
        background: rgba(168, 85, 247, 0.1);
      }
      /* 新規: 効果音用スタイル */
      .script-row.type-sfx {
        border-color: var(--accent-sfx);
        background: rgba(245, 158, 11, 0.1);
      }

      /* Columns */
      .row-left {
        width: 100px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0.5rem;
        cursor: pointer;
      }
      .row-left:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .char-face {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid var(--accent);
        margin-bottom: 0.2rem;
        background: #000;
      }
      .type-icon {
        font-size: 2rem;
        margin-bottom: 5px;
      }
      .icon-bg {
        color: var(--accent-bg);
      }
      .icon-music {
        color: var(--accent-music);
      }
      .icon-sfx {
        color: var(--accent-sfx);
      } /* 新規 */

      .row-center {
        flex: 1;
        padding: 0.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      textarea.dialogue-input {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        color: white;
        resize: none;
        font-size: 1rem;
        outline: none;
      }

      /* Preview Areas */
      .preview-box {
        width: 100%;
        height: 80px;
        background: rgba(0, 0, 0, 0.3);
        border: 2px dashed #64748b;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #cbd5e1;
        overflow: hidden;
        flex-direction: column;
        gap: 5px;
      }
      .preview-box:hover {
        border-color: white;
        color: white;
      }
      .preview-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .audio-player-ui {
        width: 100%;
        padding: 0 1rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .audio-player-ui audio {
        width: 100%;
        height: 30px;
      }

      /* Options Column */
      .row-options {
        width: 220px;
        border-left: 1px solid var(--border);
        padding: 0.5rem;
        font-size: 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.1);
      }

      .btn-type-change {
        background: #64748b;
        color: white;
        border: none;
        padding: 4px;
        border-radius: 4px;
        cursor: pointer;
        margin-bottom: 0.5rem;
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .btn-type-change:hover {
        background: #94a3b8;
      }

      /* ★★★ 行削除ボタン用スタイル ★★★ */
      .btn-delete-row {
        background: var(--danger);
        color: white;
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        margin-top: auto; /* オプション列の一番下に配置 */
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .btn-delete-row:hover {
        opacity: 0.9;
      }

      .btn-img-change {
        background: #475569;
        color: white;
        border: 1px solid #64748b;
        padding: 4px 8px;
        border-radius: 3px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .skip-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #f8fafc;
        font-weight: bold;
      }
      .skip-toggle input {
        width: auto;
        margin: 0;
        cursor: pointer;
      }
      .skip-toggle:hover {
        color: var(--accent);
      }

      /* 新規: 待機トグル用 */
      .wait-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #f8fafc;
      }
      .wait-toggle input {
        width: auto;
        margin: 0;
      }
      .wait-toggle:hover {
        color: var(--accent-sfx);
      }

      #btn-add-row {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--accent);
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        font-size: 2rem;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* --- Modals --- */
      #picker-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 300;
        justify-content: center;
        align-items: center;
      }

      #settings-modal,
      #char-edit-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 200;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: var(--bg-panel);
        width: 500px;
        max-height: 80vh;
        border-radius: 8px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.5rem;
      }
      .modal-body {
        overflow-y: auto;
        flex: 1;
      }
      .modal-close {
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1.2rem;
      }

      .setting-group {
        margin-bottom: 1.5rem;
        border: 1px solid var(--border);
        padding: 1rem;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.2);
      }
      .setting-group h4 {
        margin: 0 0 1rem 0;
        font-size: 0.9rem;
        color: #cbd5e1;
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.5rem;
      }
      .setting-item {
        margin-bottom: 1rem;
      }
      .setting-item:last-child {
        margin-bottom: 0;
      }

      .type-select-btn {
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
        padding: 1rem;
        margin-bottom: 0.5rem;
        background: #1e293b;
        border: 1px solid var(--border);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        text-align: left;
      }
      .type-select-btn:hover {
        background: #334155;
        border-color: var(--accent);
      }
      .type-select-btn strong {
        display: block;
        font-size: 1.1rem;
        margin-bottom: 0.2rem;
      }

      .preview {
        position: absolute;
        top: 0px;
        left: 0px;
        width: 100vw;
        height: 100vh;
        display: none;
        overflow: hidden;
      }

      .background {
        position: absolute;
        top: 0px;
        left: 0px;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .dialog-container {
        width: 100%;
        height: auto;
        min-height: 50%;
        position: fixed;
        left: 0px;
        bottom: 0px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .dialog {
        width: 80%;
        height: 150px;
        border-width: 0;
        border-style: solid;
        border-image-source: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAAB30lEQVR4AeyTQY6DMBAE8f7/z+xunEMQhzm0xgWkpOBEWOOOq9Q/27btPhyDfwF//P1QBBRAkX/nHgTs+7759DN4s399HQS83rgsJaCApbjPYQo4M1n6RgFLcZ/DFHBmsvSNApbiPod9p4AzB+yNAjD0M1gBkwO2KgBDP4MVMDlgqwIw9DNYAZMDtioAQz+DFTA5YKsCMPQzWAGTA7YuFIDd8dLBCoD1KEABMAE43gYoACYAx9sABcAE4HgboACYABxvA5oFVMcroCLUvK+AZsDV8QqoCDXvK6AZcHW8AipCzfsKaAZcHa+AilDzvgKaAVfHK6Ai1LyvgGbA1fHK6Ai1LyvgGbA1fHPFFDd+kL7CoBlKEABMAE43gYoACYAx9sABcAE4HgboACYABxvA54jAL7JTeNtACxOAQqACcDxNkABMAE43gYoACYAx9sABcAE4HgbEApIxxWQEgznFRACTMcVkBIM5xUQAkzHFZASDOcVEAJMxxWQEgznFRACTMcVkBIM5xUQAkzH7ykgvfWF5hUAy1CAAmACcLwNUABMAI63AQqACcDxNkABMAE43gbcRwD8Tx8abwNgsQpQAEwAjrcBCoAJwPE2QAEwATj+0IAxxjaGzxi9DD6dHwR8bvh7DQEFFJy7t38BAAD//01Lw/oAAAAGSURBVAMAN6JucKoZFW0AAAAASUVORK5CYII=");
        border-image-slice: var(--slice-width) fill;
        border-image-width: var(--border-width);
        border-image-repeat: stretch;
        word-break: break-all;
        white-space: pre-wrap;
        font-size: 3em;
      }

      .dialog span {
        display: inline-block;
      }

      .character {
        transform-origin: top left;
      }

      .char-edit-preview-row {
        display: flex;
        gap: 1rem;
      }
      .char-edit-preview-row > div {
        flex: 1;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
  </head>
  <body>
    <div class="editor">
      <header>
        <div class="header-left">
          <h1>Farce Generater</h1>
        </div>
        <div class="btn-group">
          <button class="btn-settings" onclick="openSettingsModal()">
            ⚙ 設定
          </button>
          <button
            class="btn-run"
            onclick="app.preview(projectSettings, characters, rows)"
          >
            ▶ 実行
          </button>
        </div>
      </header>

      <main>
        <section id="asset-zone">
          <div class="zone-title">キャラクター作成</div>
          <div class="char-creator">
            <div class="input-group">
              <label>名前</label>
              <input type="text" id="new-char-name" placeholder="例: Mickey" />
            </div>
            <div class="input-group">
              <label>デフォルト画像</label>
              <input type="file" id="new-char-img" accept="image/*" />
            </div>
            <button class="btn-add" onclick="createCharacter()">
              キャラクターを追加
            </button>
          </div>

          <div class="zone-title">登録済みキャラクター (タップで編集)</div>
          <div id="char-list" class="asset-grid"></div>

          <div class="zone-title">素材アップロード</div>
          <div style="margin-bottom: 1rem">
            <input
              type="file"
              id="asset-upload"
              multiple
              onchange="handleAssetUpload(this)"
              accept="image/*,audio/*"
            />
          </div>

          <div class="zone-title">画像 (Images)</div>
          <div id="asset-list-image" class="asset-grid"></div>

          <div class="zone-title">ボイス (Voice)</div>
          <div id="asset-list-voice" class="asset-grid"></div>

          <div class="zone-title">BGM</div>
          <div id="asset-list-bgm" class="asset-grid"></div>

          <div class="zone-title">効果音 (SE)</div>
          <div id="asset-list-fx" class="asset-grid"></div>
        </section>

        <section id="script-zone">
          <div id="script-container"></div>
          <button id="btn-add-row" onclick="addNewRow()">+</button>
        </section>
      </main>

      <div
        id="audio-class-modal"
        style="
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.8);
          z-index: 400;
          justify-content: center;
          align-items: center;
        "
      >
        <div class="modal-content" style="height: auto; max-width: 400px">
          <div class="modal-header">
            <h3>音声ファイルの分類</h3>
          </div>
          <div class="modal-body">
            <p style="margin-bottom: 1rem">
              アップロードされた音声ファイルのカテゴリを選択してください。
            </p>
            <div class="input-group">
              <label>カテゴリ</label>
              <select id="modal-audio-type">
                <option value="voice">ボイス (Voice)</option>
                <option value="bgm">BGM</option>
                <option value="fx">効果音 (SE)</option>
              </select>
            </div>
            <div
              style="
                display: flex;
                gap: 10px;
                margin-top: 1.5rem;
                justify-content: flex-end;
              "
            >
              <button
                class="btn-danger"
                style="width: auto; margin: 0"
                onclick="cancelAudioUpload()"
              >
                キャンセル
              </button>
              <button
                class="btn-run"
                style="width: auto"
                onclick="confirmAudioUpload()"
              >
                決定して追加
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="picker-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="modal-title">選択</h3>
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          <div class="modal-body" id="modal-body-content"></div>
        </div>
      </div>

      <div id="settings-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>プロジェクト設定</h3>
            <button class="modal-close" onclick="closeSettingsModal()">
              ×
            </button>
          </div>
          <div class="modal-body">
            <div class="setting-group">
              <h4>一般設定</h4>
              <div class="setting-item">
                <label>初期背景画像</label>
                <div
                  class="preview-box"
                  id="setting-bg-preview"
                  onclick="openAssetPicker('global', 'setting-bg')"
                >
                  <span>🖼 背景を選択</span>
                </div>
              </div>
            </div>

            <div class="setting-group">
              <h4>ダイアログスタイル</h4>
              <div id="theme-list" class="asset-grid"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="char-edit-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3>キャラクター編集</h3>
            <button class="modal-close" onclick="closeCharEditModal()">
              ×
            </button>
          </div>
          <div class="modal-body">
            <div class="input-group">
              <label>名前</label>
              <input type="text" id="edit-char-name" />
            </div>

            <div class="char-edit-preview-row">
              <div>
                <label>画像</label>
                <div
                  class="preview-box"
                  id="edit-char-img-preview"
                  onclick="openAssetPicker('edit-char', 'edit-char-img')"
                >
                  <img src="" />
                </div>
              </div>
              <div>
                <label>ボイス (音声)</label>
                <div
                  class="preview-box"
                  id="edit-char-voice-preview"
                  onclick="openAssetPicker('edit-char', 'edit-char-voice')"
                >
                  <span>🎵 なし</span>
                </div>
              </div>
            </div>

            <button
              class="btn-add"
              onclick="saveCharEdit()"
              style="margin-top: 2rem"
            >
              保存する
            </button>
            <button class="btn-danger" onclick="deleteChar()">削除する</button>
          </div>
        </div>
      </div>
    </div>
    <div class="preview">
      <img class="background" />
    </div>
    <script src="https://nk5tjs.csb.app/public/index.js"></script>

    <script src="./src/js/utils.js"></script>
    <script src="./src/js/archive.js"></script>
    <script src="./src/js/parser.js"></script>
    <script src="./src/js/assets.js"></script>
    <script src="./src/js/character.js"></script>
    <script src="./src/js/dialog.js"></script>
    <script src="./src/js/screen.js"></script>
    <script src="./src/js/loader.js"></script>
    <script src="./src/js/application.js"></script>

    <script>
      const app = new Application();
      // --- データ管理 ---
      let assets = [];
      let characters = [];
      let rows = [];
      let rowCounter = 0;

      // プロジェクト全体の設定を保持するオブジェクト
      let projectSettings = {
        initialBackground: null,
        dialogTheme: Assets.images.themes
          ? Object.keys(Assets.images.themes)[0]
          : null,
      };

      // キャラクター編集用の一時変数
      let editingCharIndex = -1;
      let tempCharData = { name: "", image: "", voice: null, voiceName: "" };

      // --- アセット & キャラクター関連 ---

      // 追加: 音声アップロード保留用の変数
      let pendingAudioFiles = [];

      function handleAssetUpload(input) {
        const files = Array.from(input.files);
        input.value = ""; // ファイル選択をリセット

        // ファイルを画像と音声に分別
        const imageFiles = files.filter((f) => f.type.startsWith("image"));
        const audioFiles = files.filter((f) => f.type.startsWith("audio"));

        // 画像は即座に処理
        if (imageFiles.length > 0) {
          processAssets(imageFiles, "image");
        }

        // 音声がある場合は一時保存してモーダルを表示
        if (audioFiles.length > 0) {
          pendingAudioFiles = audioFiles;
          document.getElementById("audio-class-modal").style.display = "flex";
        }
      }

      function confirmAudioUpload() {
        const category = document.getElementById("modal-audio-type").value;
        if (pendingAudioFiles.length > 0) {
          processAssets(pendingAudioFiles, category);
        }
        closeAudioUploadModal();
      }

      function cancelAudioUpload() {
        pendingAudioFiles = []; // 破棄
        closeAudioUploadModal();
      }

      function closeAudioUploadModal() {
        document.getElementById("audio-class-modal").style.display = "none";
      }

      // 共通アセット処理関数
      function processAssets(files, category) {
        files.forEach((file) => {
          const url = URL.createObjectURL(file);

          // カテゴリが image なら type=image, それ以外(bgm,voice等)なら type=audio
          const type = category === "image" ? "image" : "audio";
          const id = file.name;

          const existingIndex = assets.findIndex((a) => a.id === id);

          const newAsset = {
            id: id,
            type: type,
            category: category,
            name: file.name,
            url: url,
          };

          if (existingIndex !== -1) {
            assets[existingIndex] = newAsset;
          } else {
            assets.push(newAsset);
          }

          // Assetsオブジェクトへの格納
          if (type === "image") {
            if (Assets.images && Assets.images.urls) {
              Assets.images.urls[id] = url;
            }
          } else {
            // 音声分類ごとの格納
            if (Assets.audio && Assets.audio[category]) {
              Assets.audio[category][id] = url;
            }
          }
        });

        renderAssetList();
      }

      function renderAssetList() {
        // 各コンテナをクリア
        const containers = {
          image: document.getElementById("asset-list-image"),
          voice: document.getElementById("asset-list-voice"),
          bgm: document.getElementById("asset-list-bgm"),
          fx: document.getElementById("asset-list-fx"),
        };

        Object.values(containers).forEach((el) => (el.innerHTML = ""));

        if (assets.length === 0) {
          containers.image.innerHTML = `<div style="grid-column:1/-1; color:#64748b; font-size:0.8rem; text-align:center;">アセットがありません</div>`;
          return;
        }

        assets.forEach((asset) => {
          const div = document.createElement("div");
          div.className = "asset-item";

          const safeId = asset.id.replace(/'/g, "\\'");

          div.innerHTML = `
                    <div class="btn-delete-asset" onclick="deleteAsset('${safeId}', event)">×</div>
                    ${
                      asset.type === "image"
                        ? `<img src="${asset.url}">`
                        : `<div class="audio-icon">🎵</div>`
                    }
                    <div class="name">${asset.name}</div>
                `;

          // カテゴリに応じて適切なコンテナに追加
          let targetCat = asset.category;
          if (!targetCat) {
            targetCat = asset.type === "image" ? "image" : "bgm"; // デフォルト
          }

          if (containers[targetCat]) {
            containers[targetCat].appendChild(div);
          }
        });
      }

      function deleteAsset(id, event) {
        event.stopPropagation();
        if (!confirm(`アセット「${id}」を削除しますか？`)) return;

        const assetToDelete = assets.find((a) => a.id === id);

        // 削除対象のデータ削除
        if (assetToDelete) {
          if (assetToDelete.type === "image") {
            if (Assets.images && Assets.images.urls)
              delete Assets.images.urls[id];
          } else {
            // 音声
            const cat = assetToDelete.category || "bgm";
            if (Assets.audio && Assets.audio[cat]) delete Assets.audio[cat][id];
          }
        }

        assets = assets.filter((a) => a.id !== id);

        // 設定で使用されていた場合クリア
        if (
          projectSettings.initialBackground &&
          assets.find((a) => a.url === projectSettings.initialBackground)
            ?.id === id
        ) {
          projectSettings.initialBackground = null;
          updateSettingsPreview();
        }

        renderAssetList();
      }

      function createCharacter() {
        const name = document.getElementById("new-char-name").value.trim();
        const imgInput = document.getElementById("new-char-img");

        if (!name) {
          alert("名前を入力してください");
          return;
        }

        if (characters.some((c) => c.name === name)) {
          alert("同じ名前のキャラクターが既に存在します");
          return;
        }

        let imgUrl = "https://via.placeholder.com/100?text=" + name[0];
        let assetId = `[Char]_${name}_placeholder`;

        if (imgInput.files && imgInput.files[0]) {
          const file = imgInput.files[0];
          imgUrl = URL.createObjectURL(file);
          assetId = file.name;

          const existingIndex = assets.findIndex((a) => a.id === assetId);
          const newAsset = {
            id: assetId,
            type: "image",
            category: "image",
            name: file.name,
            url: imgUrl,
          };

          if (existingIndex !== -1) {
            assets[existingIndex] = newAsset;
          } else {
            assets.push(newAsset);
          }
          if (Assets.images.urls) Assets.images.urls[assetId] = imgUrl;
          renderAssetList();
        }

        const newChar = {
          name: name,
          image: imgUrl,
          voice: null,
          voiceName: null,
        };
        characters.push(newChar);
        renderCharList();

        document.getElementById("new-char-name").value = "";
        document.getElementById("new-char-img").value = "";

        if (rows.length === 0) addNewRow();
      }

      function renderCharList() {
        const container = document.getElementById("char-list");
        container.innerHTML = "";

        characters.forEach((char, index) => {
          const div = document.createElement("div");
          div.className = "asset-item";

          // ★変更点: キャラが2体以上いる場合のみ削除ボタンのHTMLを生成
          let deleteBtnHtml = "";
          if (characters.length > 1) {
            // event.stopPropagation() で親要素(編集モーダルを開く)へのクリック伝播を止めています
            deleteBtnHtml = `<div class="btn-delete-asset" onclick="deleteCharacterFromList(${index}, event)">×</div>`;
          }

          div.innerHTML = `
                    ${deleteBtnHtml}
                    <div class="char-badge">Char</div>
                    <img src="${char.image}">
                    <div class="name">${char.name}</div>
                `;

          // 本体をクリックしたときは編集モーダルを開く
          div.onclick = () => openCharEditModal(index);
          container.appendChild(div);
        });
      }

      // ★追加: リストから直接削除する関数
      function deleteCharacterFromList(index, event) {
        // 親要素のクリックイベント（編集モーダルを開く処理）をキャンセル
        event.stopPropagation();

        if (characters.length <= 1) {
          alert("キャラクターが残り1体のため削除できません。");
          return;
        }

        const charName = characters[index].name;

        if (
          !confirm(
            `キャラクター「${charName}」を削除しますか？\n使用されている行の割り当ては解除されませんが、正しく表示されなくなる可能性があります。`
          )
        ) {
          return;
        }

        // 配列から削除して再描画
        characters.splice(index, 1);
        renderCharList();
      }

      // --- Character Edit Logic ---

      function openCharEditModal(index) {
        editingCharIndex = index;
        const char = characters[index];
        tempCharData = { ...char };

        document.getElementById("edit-char-name").value = tempCharData.name;
        updateCharEditPreview();

        document.getElementById("char-edit-modal").style.display = "flex";
      }

      function closeCharEditModal() {
        document.getElementById("char-edit-modal").style.display = "none";
        editingCharIndex = -1;
      }

      function updateCharEditPreview() {
        const imgPreview = document.getElementById("edit-char-img-preview");
        imgPreview.innerHTML = `<img src="${tempCharData.image}">`;

        const voicePreview = document.getElementById("edit-char-voice-preview");
        if (tempCharData.voice) {
          voicePreview.innerHTML = `<div style="font-size:0.8rem;">🎵 ${
            tempCharData.voiceName || "Selected"
          }</div>`;
        } else {
          voicePreview.innerHTML = `<span>🎵 なし</span>`;
        }
      }

      function saveCharEdit() {
        if (editingCharIndex === -1) return;

        const newName = document.getElementById("edit-char-name").value.trim();
        if (!newName) {
          alert("名前を入力してください");
          return;
        }

        if (
          characters.some(
            (c, i) => i !== editingCharIndex && c.name === newName
          )
        ) {
          alert("同じ名前のキャラクターが既に存在します");
          return;
        }

        const oldName = characters[editingCharIndex].name;

        characters[editingCharIndex] = {
          ...characters[editingCharIndex],
          name: newName,
          image: tempCharData.image,
          voice: tempCharData.voice,
          voiceName: tempCharData.voiceName,
        };

        if (oldName !== newName) {
          rows.forEach((r) => {
            if (r.charId === oldName) {
              r.charId = newName;
            }
          });
          rows.forEach((r) => renderRowUI(r.id));
        } else {
          rows.forEach((r) => {
            if (r.charId === newName) renderRowUI(r.id);
          });
        }

        renderCharList();
        closeCharEditModal();
      }

      function deleteChar() {
        if (editingCharIndex === -1) return;
        const charName = characters[editingCharIndex].name;

        if (
          !confirm(
            `キャラクター「${charName}」を削除しますか？\n使用されている行の割り当ては解除されませんが、正しく表示されなくなる可能性があります。`
          )
        )
          return;

        characters.splice(editingCharIndex, 1);
        renderCharList();
        closeCharEditModal();
      }

      // --- スクリプト行管理 (Core) ---

      function addNewRow() {
        if (characters.length === 0) {
          alert("先にキャラクターを作成してください！");
          return;
        }
        const rowId = "row-" + rowCounter++;
        rows.push({
          id: rowId,
          type: "dialogue",
          charId: characters[0].name,
          text: "",
          mediaUrl: null,
          skipDisabled: false,
          waitForFinish: false, // 効果音用: 終了まで待機するか
        });
        renderRowUI(rowId);
      }

      // ★★★ 追加: 行を削除する関数 ★★★
      function deleteRow(rowId) {
        if (!confirm("この行を削除してもよろしいですか？")) return;

        // データ配列から削除
        rows = rows.filter((r) => r.id !== rowId);

        // DOM要素を削除
        const el = document.getElementById(rowId);
        if (el) {
          el.remove();
        }
      }

      function renderRowUI(rowId) {
        const container = document.getElementById("script-container");
        const rowData = rows.find((r) => r.id === rowId);
        if (!rowData) return;

        let rowEl = document.getElementById(rowId);
        if (!rowEl) {
          rowEl = document.createElement("div");
          rowEl.id = rowId;
          container.appendChild(rowEl);
          rowEl.scrollIntoView({ behavior: "smooth" });
        }

        rowEl.className = "script-row";
        if (rowData.type === "background") rowEl.classList.add("type-bg");
        if (rowData.type === "bgm") rowEl.classList.add("type-bgm");
        if (rowData.type === "sfx") rowEl.classList.add("type-sfx");

        if (rowData.type === "dialogue") {
          renderDialogueRow(rowEl, rowData);
        } else if (rowData.type === "background") {
          renderBackgroundRow(rowEl, rowData);
        } else if (rowData.type === "bgm") {
          renderBgmRow(rowEl, rowData);
        } else if (rowData.type === "sfx") {
          renderSfxRow(rowEl, rowData);
        }
      }

      // ★★★ 修正: 削除ボタンを含めるように変更 ★★★
      function getCommonOptions(rowId, isSkipDisabled, type) {
        let skipOptionHtml = "";

        if (type === "dialogue") {
          skipOptionHtml = `
                    <label class="skip-toggle">
                        <input type="checkbox" onchange="updateSkip('${rowId}', this.checked)" ${
            isSkipDisabled ? "checked" : ""
          }>
                        🚫 スキップ禁止
                    </label>
                    <div style="border-top:1px solid #ffffff20; margin:5px 0;"></div>
                `;
        }

        return `
                <button class="btn-type-change" onclick="openTypePicker('${rowId}')">
                    🔁 種類変更
                </button>
                ${skipOptionHtml}
                
                <button class="btn-delete-row" onclick="deleteRow('${rowId}')">
                    🗑 削除
                </button>
            `;
      }

      function updateSkip(rowId, checked) {
        const r = rows.find((r) => r.id === rowId);
        if (r) r.skipDisabled = checked;
      }

      // 効果音用の同期・非同期フラグ更新
      function updateWait(rowId, checked) {
        const r = rows.find((r) => r.id === rowId);
        if (r) r.waitForFinish = checked;
      }

      function renderDialogueRow(el, data) {
        const char =
          characters.find((c) => c.name === data.charId) || characters[0];

        // 画像継承ロジック
        let charImage = null;
        if (data.mediaUrl) {
          charImage = data.mediaUrl;
        } else {
          const currentIndex = rows.findIndex((r) => r.id === data.id);
          if (currentIndex > 0) {
            for (let i = currentIndex - 1; i >= 0; i--) {
              const prevRow = rows[i];
              if (
                prevRow.type === "dialogue" &&
                prevRow.charId === data.charId &&
                prevRow.mediaUrl
              ) {
                charImage = prevRow.mediaUrl;
                break;
              }
            }
          }
        }
        if (!charImage) {
          charImage =
            char && char.image ? char.image : "https://via.placeholder.com/60";
          data.mediaUrl = charImage;
        }

        const charName = char ? char.name : data.charId;

        el.innerHTML = `
                <div class="row-left" onclick="openCharPicker('${data.id}')">
                    <img class="char-face" src="${charImage}" id="${
          data.id
        }-face">
                    <span id="${data.id}-name">${charName}</span>
                </div>
                <div class="row-center">
                    <textarea class="dialogue-input" placeholder="セリフを入力..." oninput="updateRowText('${
                      data.id
                    }', this.value)">${data.text}</textarea>
                </div>
                <div class="row-options">
                    ${getCommonOptions(data.id, data.skipDisabled, "dialogue")}
                    <label>表情差分</label>
                    <button class="btn-img-change" onclick="openAssetPicker('${
                      data.id
                    }', 'face')">
                        <img src="${charImage}" style="width:20px; height:20px; object-fit:cover;" id="${
          data.id
        }-opt-thumb">
                        <span>変更...</span>
                    </button>
                    <div style="margin-top:5px;">
                        <label>速度 <input type="range" style="width:60px;"></label>
                    </div>
                </div>
            `;
      }

      function renderBackgroundRow(el, data) {
        const bgPreview = data.mediaUrl
          ? `<img src="${data.mediaUrl}">`
          : `<span>🖼 背景を選択</span>`;

        el.innerHTML = `
                <div class="row-left">
                    <div class="type-icon icon-bg">🌄</div>
                    <span>背景変更</span>
                </div>
                <div class="row-center">
                    <div class="preview-box" onclick="openAssetPicker('${
                      data.id
                    }', 'bg')">
                        ${bgPreview}
                    </div>
                </div>
                <div class="row-options">
                    ${getCommonOptions(
                      data.id,
                      data.skipDisabled,
                      "background"
                    )}
                    <label>トランジション</label>
                    <select style="width:100%;"><option>フェード</option><option>スライド</option></select>
                </div>
            `;
      }

      function renderBgmRow(el, data) {
        let centerContent = "";
        if (data.mediaUrl) {
          const asset = assets.find((a) => a.url === data.mediaUrl);
          const name = asset ? asset.name : "Unknown Audio";
          centerContent = `
                    <div class="audio-player-ui">
                        <div style="font-size:0.9rem; margin-right:auto;">🎵 ${name}</div>
                        <audio controls src="${data.mediaUrl}"></audio>
                        <button onclick="clearMedia('${data.id}')" style="background:#ef4444; border:none; color:white; border-radius:4px; cursor:pointer;">削除</button>
                    </div>
                `;
        } else {
          centerContent = `
                    <div class="preview-box" onclick="openAssetPicker('${data.id}', 'bgm')">
                        <span>🎵 音楽を選択</span>
                    </div>
                `;
        }

        el.innerHTML = `
                <div class="row-left">
                    <div class="type-icon icon-music">🎼</div>
                    <span>BGM変更</span>
                </div>
                <div class="row-center" style="justify-content:center;">
                    ${centerContent}
                </div>
                <div class="row-options">
                    ${getCommonOptions(data.id, data.skipDisabled, "bgm")}
                    <label>音量 <input type="range" min="0" max="100" style="width:100%"></label>
                    <div style="margin-top:5px;">
                        <label><input type="checkbox" checked> フェードイン</label>
                    </div>
                </div>
            `;
      }

      // 追加: 効果音 (SE) 行のレンダリング
      function renderSfxRow(el, data) {
        let centerContent = "";
        if (data.mediaUrl) {
          const asset = assets.find((a) => a.url === data.mediaUrl);
          const name = asset ? asset.name : "Unknown Audio";
          centerContent = `
                    <div class="audio-player-ui">
                        <div style="font-size:0.9rem; margin-right:auto;">🔊 ${name}</div>
                        <audio controls src="${data.mediaUrl}"></audio>
                        <button onclick="clearMedia('${data.id}')" style="background:#ef4444; border:none; color:white; border-radius:4px; cursor:pointer;">削除</button>
                    </div>
                `;
        } else {
          centerContent = `
                    <div class="preview-box" onclick="openAssetPicker('${data.id}', 'sfx')">
                        <span>🔊 効果音を選択</span>
                    </div>
                `;
        }

        el.innerHTML = `
                <div class="row-left">
                    <div class="type-icon icon-sfx">🔊</div>
                    <span>効果音</span>
                </div>
                <div class="row-center" style="justify-content:center;">
                    ${centerContent}
                </div>
                <div class="row-options">
                    ${getCommonOptions(data.id, data.skipDisabled, "sfx")}
                    
                    <label class="wait-toggle" style="margin-top:10px;">
                        <input type="checkbox" onchange="updateWait('${
                          data.id
                        }', this.checked)" ${
          data.waitForFinish ? "checked" : ""
        }>
                        ⏳ 再生終了まで待機
                    </label>
                    
                    <label style="margin-top:10px;">音量 <input type="range" min="0" max="100" style="width:100%"></label>
                </div>
            `;
      }

      function updateRowText(rowId, val) {
        const r = rows.find((r) => r.id === rowId);
        if (r) r.text = val;
      }

      function clearMedia(rowId) {
        const r = rows.find((r) => r.id === rowId);
        if (r) {
          r.mediaUrl = null;
          renderRowUI(rowId);
        }
      }

      // --- Settings Logic ---

      function openSettingsModal() {
        updateSettingsPreview();
        renderThemeSettings();
        document.getElementById("settings-modal").style.display = "flex";
      }

      function closeSettingsModal() {
        document.getElementById("settings-modal").style.display = "none";
      }

      function updateSettingsPreview() {
        const previewEl = document.getElementById("setting-bg-preview");
        if (projectSettings.initialBackground) {
          previewEl.innerHTML = `<img src="${projectSettings.initialBackground}">`;
        } else {
          previewEl.innerHTML = `<span>🖼 背景を選択</span>`;
        }
      }

      function renderThemeSettings() {
        const container = document.getElementById("theme-list");
        container.innerHTML = "";

        if (
          typeof Assets === "undefined" ||
          !Assets.images ||
          !Assets.images.themes
        ) {
          container.innerHTML =
            '<p style="font-size:0.8rem; color:#94a3b8;">テーマが見つかりません</p>';
          return;
        }

        const themes = Assets.images.themes;
        Object.keys(themes).forEach((key) => {
          const theme = themes[key];
          const div = document.createElement("div");
          div.className = "asset-item";

          if (projectSettings.dialogTheme === key) {
            div.style.borderColor = "var(--accent)";
            div.style.background = "#475569";
          }

          div.innerHTML = `
                  <img src="${theme.url}" style="height: 50px; object-fit: contain;">
                  <div class="name">${key}</div>
              `;

          div.onclick = () => {
            projectSettings.dialogTheme = key;
            renderThemeSettings();
          };

          container.appendChild(div);
        });
      }

      // --- Picker Modals ---

      function openTypePicker(rowId) {
        const modalBody = document.getElementById("modal-body-content");
        document.getElementById("modal-title").textContent =
          "セクションの種類を選択";
        modalBody.innerHTML = "";
        modalBody.className = "";

        const types = [
          {
            id: "dialogue",
            label: "💬 セリフ",
            desc: "キャラクターの会話",
            color: "#fff",
          },
          {
            id: "background",
            label: "🌄 背景変更",
            desc: "背景画像を切り替え",
            color: "#10b981",
          },
          {
            id: "bgm",
            label: "🎼 BGM変更",
            desc: "BGMの再生・停止",
            color: "#a855f7",
          },
          // 追加: 効果音タイプ
          {
            id: "sfx",
            label: "🔊 効果音 (SE)",
            desc: "SEを再生",
            color: "#f59e0b",
          },
        ];

        types.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = "type-select-btn";
          btn.innerHTML = `<div><strong style="color:${t.color}">${t.label}</strong><small style="color:#94a3b8;">${t.desc}</small></div>`;
          btn.onclick = () => {
            const r = rows.find((row) => row.id === rowId);
            if (r) {
              r.type = t.id;
              r.mediaUrl = null;
              // 効果音なら待機フラグ初期化
              if (t.id === "sfx") r.waitForFinish = false;
            }
            renderRowUI(rowId);
            closeModal();
          };
          modalBody.appendChild(btn);
        });
        document.getElementById("picker-modal").style.display = "flex";
      }

      function openCharPicker(rowId) {
        const modalBody = document.getElementById("modal-body-content");
        document.getElementById("modal-title").textContent =
          "キャラクターを選択";
        modalBody.innerHTML = "";
        modalBody.className = "asset-grid";

        characters.forEach((char) => {
          const div = document.createElement("div");
          div.className = "asset-item";
          div.innerHTML = `<img src="${char.image}"><div class="name">${char.name}</div>`;
          div.onclick = () => {
            const r = rows.find((row) => row.id === rowId);
            if (r) r.charId = char.name;
            renderRowUI(rowId);
            closeModal();
          };
          modalBody.appendChild(div);
        });
        document.getElementById("picker-modal").style.display = "flex";
      }

      function openAssetPicker(rowId, targetMode) {
        const modalBody = document.getElementById("modal-body-content");

        let filterType = "image";
        let title = "画像を選択";
        let categoryFilter = null; // 'voice', 'bgm', 'fx' or null (all audio)

        if (targetMode === "bgm") {
          filterType = "audio";
          title = "BGMを選択";
          categoryFilter = "bgm";
        } else if (targetMode === "sfx") {
          // 追加: SE用フィルタ
          filterType = "audio";
          title = "効果音を選択";
          categoryFilter = "fx";
        } else if (targetMode === "edit-char-voice") {
          filterType = "audio";
          title = "ボイスを選択";
          categoryFilter = "voice";
        } else if (targetMode === "setting-bg") {
          title = "初期背景画像を選択";
        }

        document.getElementById("modal-title").textContent = title;

        // フィルタリング
        const filteredAssets = assets.filter((a) => {
          if (a.type !== filterType) return false;
          if (filterType === "audio" && categoryFilter) {
            return a.category === categoryFilter;
          }
          return true;
        });

        modalBody.innerHTML = "";
        modalBody.className = "asset-grid";

        if (filteredAssets.length === 0) {
          modalBody.innerHTML = `<p style="padding:1rem;">該当する${
            filterType === "audio" ? "音声" : "画像"
          }ファイルがありません。</p>`;
        }

        filteredAssets.forEach((asset) => {
          const div = document.createElement("div");
          div.className = "asset-item";
          div.innerHTML = `
                    ${
                      asset.type === "image"
                        ? `<img src="${asset.url}">`
                        : `<div class="audio-icon">🎵</div>`
                    }
                    <div class="name">${asset.name}</div>
                `;

          div.onclick = () => {
            // モードによって処理を分岐
            if (targetMode === "setting-bg") {
              projectSettings.initialBackground = asset.url;
              updateSettingsPreview();
            } else if (targetMode === "edit-char-img") {
              tempCharData.image = asset.url;
              updateCharEditPreview();
            } else if (targetMode === "edit-char-voice") {
              tempCharData.voice = asset.url;
              tempCharData.voiceName = asset.name;
              updateCharEditPreview();
            } else {
              // 既存のRow更新ロジック
              const r = rows.find((row) => row.id === rowId);
              if (r) {
                if (targetMode === "face") {
                  r.mediaUrl = asset.url;
                  const currentIndex = rows.findIndex(
                    (row) => row.id === rowId
                  );
                  renderRowUI(rowId);
                  for (let i = currentIndex + 1; i < rows.length; i++) {
                    const nextRow = rows[i];
                    if (nextRow.charId !== r.charId || nextRow.mediaUrl) {
                      if (nextRow.charId === r.charId && nextRow.mediaUrl)
                        break;
                      continue;
                    }
                    if (nextRow.charId === r.charId) {
                      renderRowUI(nextRow.id);
                    }
                  }
                  closeModal();
                  return;
                } else {
                  r.mediaUrl = asset.url;
                }
              }
              renderRowUI(rowId);
            }
            closeModal();
          };
          modalBody.appendChild(div);
        });
        document.getElementById("picker-modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("picker-modal").style.display = "none";
      }
    </script>
  </body>
</html>
